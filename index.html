<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti 💌</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KF5WB2ENP1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KF5WB2ENP1');
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla de inicio -->
    <div id="landing-screen" class="screen active">
        <div class="stars-bg" id="landing-stars"></div>
        <div class="landing-content">
            <div class="envelope-icon">💌</div>
            <h1 class="title">Para Meyli...</h1>
            <p class="subtitle">Toca para descubrir algo especial</p>
            <button id="open-btn" class="magic-btn">
                <span>Comenzar el Viaje</span>
                <div class="btn-glow"></div>
            </button>
        </div>
    </div>

    <!-- Contenedor principal de la constelación -->
    <div id="constellation-screen" class="screen">
        <canvas id="star-canvas"></canvas>
        
        <div class="music-control">
            <button id="mute-btn" aria-label="Silenciar música">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            </button>
        </div>

        <!-- Indicador de instrucción -->
        <div id="instruction" class="instruction">
            <span>✨ Toca la estrella brillante ✨</span>
        </div>

        <div id="nodes-container"></div>
        
        <!-- Modal para el texto de la carta -->
        <div id="content-modal" class="hidden">
            <div class="glass-card">
                <div class="card-decoration top-left"></div>
                <div class="card-decoration top-right"></div>
                <div class="card-decoration bottom-left"></div>
                <div class="card-decoration bottom-right"></div>
                <div id="modal-body" class="letter-content"></div>
                <button id="next-btn" class="next-btn">
                    <span>Siguiente</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>

        <!-- YouTube Music Player (hidden but functional) -->
        <div style="position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;">
            <div id="youtube-player"></div>
        </div>
        <script src="https://www.youtube.com/iframe_api"></script>
    </div>

    <script src="script.js"></script>
</body>
</html>
