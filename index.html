<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para ti 💌</title>
    
    <!-- Google Analytics - ID de medición -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KF5WB2ENP1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // ID de medición para métricas de tiempo y visitas
      gtag('config', 'G-KF5WB2ENP1');
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla de inicio para interacción (necesaria para reproducir audio) -->
    <div id="landing-screen" class="screen active">
        <div class="landing-content">
            <h1 class="title">Para Meyli...</h1>
            <p class="subtitle">Una pequeña constelación de pensamientos</p>
            <button id="open-btn" class="glow-on-hover">Comenzar el Viaje ✨</button>
        </div>
    </div>

    <!-- Contenedor principal de la constelación -->
    <div id="constellation-screen" class="screen">
        <canvas id="star-canvas"></canvas>
        
        <div class="music-control">
            <button id="mute-btn" aria-label="Silenciar música">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            </button>
        </div>

        <div id="nodes-container"></div>
        
        <!-- Modal para el texto de la carta -->
        <div id="content-modal" class="hidden">
            <div class="glass-card">
                <div id="modal-body" class="letter-content"></div>
                <button id="next-btn" class="next-btn">Siguiente 🌟</button>
            </div>
        </div>
    </div>

        <!-- Texto final romántico -->
        <div id="final-text-container" class="hidden">
            <h1 class="final-name">Meyli</h1>
            <p class="final-message">Gracias por cruzarte en mi camino ✨</p>
        </div>

        <!-- Contenedor oculto para la música de YouTube -->
        <div id="youtube-player" style="display:none;"></div>
        <script src="https://www.youtube.com/iframe_api"></script>

    </div>

    <script src="script.js"></script>
</body>
</html>
